front:
  text: 太上靈寳无極至道開化真經卷中伯二
  hash: sha256:906c5c14bb6be7ad9ebe03e9a409cf5fa856d344874136ace820b081b363f6d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0035_HFL_002-001a, image: hfl/0766/0766-050.png}
body:
  text: 周死章第九周濟也死逝也道德以配上皇穹必感之配合也用道德善正以合上帝也道德之本者始於事親矣孝者德之本亦爲道之首親之若喪焉誠哀而葬焉死葬之以禮禱天而薦焉建善而度焉篆靈書而較焉圖丹文而告焉祈丹天十方而追救也如誠虔懇天必與焉如誠虔懇者若敬禱之也天必與焉者孝敬之德天道應之也分祥宥愆而降澤分祥者降福也宥愆者赦罪也子孫亦昌度魂鍊魄而昇遷度魂鍊魄者鍊度魂魄於流火之庭也昇遷者元始禁書赤帝保舉列上南宫受化更生也然後逮乎親踈長幼然後次右也逮及也親内外親屬踈異人也長幼或大或小也遐邇孤徒遐邇者遠近也白楊爲侣清風恃儔明月友鄰天地爲伴㡭匪所依謂之孤也骸骨不收凄清草木横土白露晝覿雲雨夜披星漢謂之徒也幽關無祀之鬼寒衆弗祭之魂北酆無祀幽爽無依若能普起慈心亦復如是普起慈心者廣發善意也亦復如是者同於前也而謂薦軷生乎陽界轉輪妙鄉度其魂魄掩其骸骨薦者度也軷者拔也令諸無祀俱得其功如此之功天亦感之天應是德即得與之百祥捐之百殃天延百福而免百禍慶延九祖亡者超生自躬届壽而奚終之也已自躬己身也届壽至於長年也奚何也終窮也道德之本始爲事親以合上帝逝事其法也然後及乎一切寒泉久隂之下沉滯無嗣之魂露白散形之骨若能廣發仁心同興巨善度而掩之其功巨矣孤徒相慶露骨韜形天心應之降于百福恩逮先亡死生得利者矣洞曰死心與意者長生之基也縱欲與性者短亡之始矣人能死其五欲即得長生之道而得百福臨躬千殃頓滅成無上道免九祖累届於眉壽輔於其神神形俱妙無生無滅者哉頌曰死欲亡賊返得生生心發意死根源機中把住長生理便是天中别有天悟生章第十悟覺也生者長生之道也人之生者悟正而已矣覺悟正者則生人之死者迷正而已矣非悟正者則死人之尚者賄而已矣人貴者財賄也人之愛者欲而已矣人貪者色欲也人之爭者暴而已矣人競者氣與暴人之迷者醴而已矣狂迷者酒醴也斯賊在人混而已矣四者具在人心正之爲悟不正之爲迷人若悟之則成其善覺者謂之善人若迷之則成其倀迷者謂之狂成其善者届福斯昌善者至於福盛成其倀者届禍斯張狂者至於禍顯悟者爲道迷者爲耗同門異舉在乎心造悟者迷執具在人心流派同源而無異也人世之端極乎斯矣彼此之由非越其四夫四者財氣酒色也小人喻於此君子違於彼是故小人居財也則不義而損人益於己君子處賄也則爲道而損己益於人小人居氣也則爭訟而違越君子在氣也則柔弱而方圓小人在酒也則快心倒形矣君子居酒也則養神育氣焉小人居色也則殘性而傷命君子在色也則無漏而無爲彼之曰道此之曰耗四者綿綿晝夜不息神仙下鬼胡有深哉厥在人心邪壬矣洞曰夫財者神仙之首而善貿於黄芽夫色者神仙之基而善利於動靜夫酒者神仙之漿而善助於元炁夫氣者神仙之本而善制於超升斯之四者仁者見之謂之仁智者見之謂之智同源派異本一分殊故云君子得之固窮小人得之傾命也頌曰氣財酒色盡由心小輩無端惹禍深惟有大哉君子用將來都化紫金身師訓章第十一垂正曰師正教曰訓人成君子之名者罔不由乎師歟成君子之名者遂於令名也罔無也由出也罔不由乎師者無不出師而成大名也師之所以貴者正之教諸諸之也師之所以尚者正也夫正者天順法尊曰正皇天無親惟德是輔德猶正也詩之三百皆思無邪詩爲法也敷正教而其猶和風乎敷揚也道德曰正猶如也春曰和風善滋萬物也教之垂正也其弟瞻而習之師訓正教弟子執行風之化和也其草偃而順之草上之風必偃若乎弟之善者以良心而誨之誨教也弟子善者教之以忠良其弟之不善者以忠恕而逝之逝却也弟之非善者忠必先教之見其不從也恕而自却之若能由是方可爲人之師矣行藏如是可曰仁師弗能如是乃爲落硌之夫也落落如草硌硌如石無戇之人謂之鄙夫悮之於人而患之基深哉師之垂正則天道順之故天之道常輔德而與正也夫正德之道可以教於人非正德之道不可以誨於人訓之以正德其如春之和風矣和風至則萬物順而得其生正教下則弟子習而遂其德然師之正務在别焉分輕重高下之器量其器而授之若中人以上者以中人已下教而誨之則失其人也若中人已下者以中人已上之教而誨之則失其言也故在弟之善者以良心而誨之弟之非善者以忠恕而逝之能如是者乃爲師之體也弗能如是止爲落硌空徒者哉不惟悮之於人而自蹈不義之鄉亦非淺矣洞曰道體虚無真空莫測若非師訓罔以逮之但積仁孝忠正利物愛人德合皇天自逢師匠矣頌曰正化其猶草順風里仁自是彼還忠憑誰問我白綵事染色青黄對不同弟學章第十二弟者爲人之弟或爲人子學覺也悟也弟子習之首也擇其善德而歸之弟子習之首者學之初也擇其善德而歸之者歸於仁師而學正德也其非善德而遠之離於非德而遠其害遜善德而爲始順道爲首遂善業而爲終成德爲終動止則造乎道行藏用仁之道視聽則在乎德觀聽以仁之德忠孝信敏勿暇乎心事主進節良志曰忠事親以禮敬順曰孝言行同契篤志曰信造次匪慢公謹曰敏勿暇乎心者無閑其志也文思禮讓勿忘乎志文思有五一曰周書又易二曰尚書詩禮三曰道德隂符素問難經四曰般若金經五曰孔文書典此之五典勿暇於思思者從意而生意居脾胃思意之性邪而貪欲有此五典而常教之薰成仁性乃歸道鄉或云無心爲道乃曰非言也心非聖訓而爲猿意非文教而爲馬猿馬之性比於無學學而覺悟始名道心至此之際方絶學也安有便無心而爲道者矣是故學而爲首文思聖言者玄之又玄也中道而行謂之曰禮遜義和同謂之曰讓勿忘乎志者無廢四者於思間也若能猶是可謂學歟弟子學之始也當擇仁師而歸之以學先王之正典其非仁師也即可遠而離之順其仁師則善德漸新故爲始也成其善德則大業以完故爲終矣言聽動觀非道德而勿爲住行坐卧非善正而不作文思禮讓非此勿行忠孝信敏非斯弗用時刻在心行藏存志若能如此可謂學也洞曰浮生如夢一切皆空幸得人身當學道德胡不然者沉淪萬古者哉頌曰鳥宿擇林足以巢爲人安不學仁教須知昔者先王訓温故知新日益鏡仁義章第十三利生度死曰仁先人後己曰義欽哉聖人之尚者仁義而已矣嘆聖人尚仁義夫仁者和同不逆愛人利物之端矣而行諸於外矣和同不逆遜也愛人利物慈也諸之也行諸於外者身外之行也夫義者善德不離中宜庸故之體矣而行諸於内矣中者中道無太過不及也宜者量其所器而行進退也庸常也此二者分之則異混之則同大道有統殊途而同歸也肈竟之間行之曷殆者哉肇始也竟終也曷猶何也殆危也肅哉聖人之貴者仁義也仁人之心則以利於生而度於死利生者所謂減刑罰方便惠恕於人責於己成人之道遂人之德令人安生使人遠惡化人歸天明地察國主尊親教人理性命根蒂復本還元此之所謂利生之道也已所謂度死者扶危厄救灾患拔一切濟物命薦幽鬼掩無祭度親疏追仇愛先於人後於己資有餘助不足顯人道晦己光此之所謂度死之道也已是故聖人尚此仁義仁義之尚和讓中宜仁者如人之首也義者如人之足也和讓中宜者如人之四肢也全之則成其身闕之則成其病夫病之生也近者惟死道也故在全形方成道矣夫和者愛人而利於一切夫讓者同塵而順於一切夫中者常道而禮於一切夫宜者處事而合於一切此之四者而與仁義同源異派終始無殊務在行藏履而用之體而爲之何有危殆者哉故聖人云愼終如始則無敗事矣洞曰愛神者謂之仁益氣者謂之義仁義之道能抱死而奚足隳哉故明王之道巨矣頌曰利生度死合高明後己先人每用平異日功成天帝召何須雲輅到東京柔和章第十四柔者柔之勝剛和者千和萬合自然成真良哉聖人之常者柔和之貴矣柔則不暴暴者爭也和則不侮侮者輕也存其柔則長柔和者生之徒却其暴侮則久爲人敬而無失與人恭而有禮人之行其柔和者猶東南地之善下也猶如也東南江海之地地之善下者招天下之水而歸之大者宜爲下天下而歸之人之柔和者感天下之心而悅之君子尊賢而容衆嘉善而矜不能者人返如之矣水之歸也則江海彌盛益也人之悅也則萬化彌安斯二者體之各異用之則同人水有異其道無别能猶是者蹈聖人之郷入聖人之室蹈履也能如是者則昇乎堂而入乎室也兹治之善不亦善乎兹此也治之善者善道也不亦善乎善良也聖人常道之首者始尚柔和之用也以柔和者亡暴侮之過暴侮既亡則敬遜而生矣敬者敬人而人返敬於己遜者遜人而人返遜於己是故先王却其暴侮存其柔和用乎是者如東南淵湖浪淘江海之德也其德也善下故天下之水而歸之即得益盛而無窮矣法之於人亦猶是也斯道至貴千秋萬古久視長存而亡其滅善之又善玄之又玄矣洞曰壼天之氣柔和則長生羽化剛强則病厄沉淪彼之謂正此之謂邪出乎爾者返乎爾也頌曰仁者敬於人斯人返敬伸義者悌於彼彼人亦義遵來往遞相德行藏互愛均大哉先聖化天下悉來賔設教章第十五設立也教正化也人之設教者述正而垂正人之設教者君子立化於人也述者此經皆祖述周書老氏孔子之文教而非自作之經也教之垂正者昭天下之風而正之昭明也正教一垂天下自賔教之垂非正者化天下之風亦非正之教之不正天下自亂風化若正則天地順之風化非正則隂陽逆之順之則泰逆之則否否泰之始本乎教也正之與邪天報如是昔者聖人垂正之教者則天道輔之神明與之輔助也臨正者則天道助神明佑使乎長存也非由之正教者則上帝奰之厚土誅之奰平義切由用也上帝者天皇上帝也奰者怒而迫之也厚土誅之者地君戮也夫教之垂正與其非正者應之猶是凡爲人之垂正者烏能弗愼而已矣爲人之垂教者君子之治天下也烏何也弗愼者不謹敬也昔者明王化于天下惟正而治政以服于萬民即得天人順之隂陽泰之元道助之神明佑之政之不然者則將反是矣正之非正者報對猶是矣凡爲天下而致生靈者胡能不愼而已哉洞曰天元正一之神者人之主公也正之則長生久視之道非正則三塗五苦之厄淪没超昇天人界哉頌曰爲政天人悉尚仁若非仁化豈能臣須知廣行慈悲者久視長生轉轉新度人章第十六接物利生曰度度人之道者聖人之要矣夫惟要者善德也已夫先人後己曰善先於人後於己夫天輔道與曰德天道無親常與善人皇天無親惟德是輔能猶是者誠曰真人誠實也真人者道德真人也非猶是者乃曰小人不然者小人也夫真人者可以度人夫小人者非可度人君子利於人小人損於人惟度人者思而愼哉接物利生度人招要乃聖人之道矣惟要者善德也夫善德之尚者先於人而後於己誠能猶是哉即得天人洞悅神明佑之高穹佑也可謂德矣既有是德寔曰真人既爲真人方可接物非此之者乃曰小人失德小輩止可害物故不可度於人也若令度於人則陷不義之郷千秋萬古之冤無時而脫者哉是故度於生而利於物者其惟真人之謂也洞曰精通秘奥熟悟希夷知神達命無所不歸者可度仙胎仁教忠良之輩也非如是者宜爲慮之頌曰處處堂堂安妥兮明明杳杳在時時玉池菡蓞清香著步步金蓮朶朶隨上方靈寳无極至道開化真經卷中
