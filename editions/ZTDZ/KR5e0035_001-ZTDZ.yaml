body:
  text: 君明章第一君之明本乎治民而已矣民之治者施寬政而惠之民庶人也治理也施行也寬和也政正也恩德曰惠言人君化於民而欲安治者務在人君施行寬政恩惠臨之則四海晏然禮樂禦之則宇宙長守也故云民之治者施寬政而惠之洞曰民爲人身之氣血精神也亦爲人身瓊樓玉室也欲理生而不致乎死者務在元神施行和氣而恩育之氣血精神瓊樓玉室得其和氣自然化生金液黄芽而逍遥乎太虚天地之鄉也頌曰元神布正育身形神得元和萬法靈天下道光無有滯自然身入太虚庭困窮則俌之困厄也窮盡也則文辭也俌助也老弱則畜之數末曰老氣虧曰弱畜養也言人君之貴者在乎助其困窮養其老弱常臨之以慈愛每濟之於不足乃爲君之用也洞曰人身之中而有五神若居困厄之間即將五神助之而得復命歸根遂再生之理也五神者一曰青龍靈童之神善能助木之神魂二曰朱雀姹女之神善能助火之神明三曰黄芽戊巳之神善能助土之意神四曰白虎庚辛之神善能助金之魄神五曰玄武元精之神善能助水之志神若困窮者及老弱者返此五神而助養於五行之神者即得長生之道也何在山遥水闊而徵者哉故曰困窮則俌之老弱則畜之頌曰一炁還生一藏神藏虧須在補天庭若將異類同根養枉費堂堂六尺身莅乎下也平等禦之莅臨也民爲下也沖和曰平周生曰等禦制也使乎臣也賞罰均之使用也輔弼曰臣益恩曰賞減禄曰罰均齊也言人君治政臨乎下民者當用平等而治之用其百寮也當用賞罰而齊之若能如此則國安於外政治於内故在平等賞罰齊之也洞曰元神治身者同前章也若調理諸神百脉六府三峯九宫五藏當用平和之氣而制之若一神太盛可罰而減之若一神太弱可賞而益之若一神安和可平而中之是故依天之道法地之德而致養生方得貴矣故臨下也平和制之用其神也加減齊之頌曰調氣安神在益陽依觀天道得其昌行斯不怠無虧爾便是長生不夜鄉綏天下也仁思鎮之綏安也天下宇宙也愛人利物謂之仁思者仁思仁志在思在念鎮伏也固天下也孝義昭之固堅也報親曰孝守中曰義昭明也言人君安於天下當用此仁愛之心在思在念以伏天下之心欲堅固守其天下當用此孝義之德以明天下之心則得天下悅服而得天下固也故云自西自東自南自北無思不服也洞曰人之元神欲安身者當用此仁愛之心時時刻刻年月日用之中固精惜氣保血潤神愛而利之勿有少慢故安其身也仁愛保而鎮之欲固其身也則内保元和之氣外扶潤澤之神勿損絲毫誠爲孝也能如是者乃爲義道矣頌曰性命堅持考爲始元神益秀義非耻昭哉時刻不忘懷便證金天大乘理以斯之道致使遠近欣樂以用也斯此也道者前章所注皆爲道也致使者能服也遠近欣樂者國安民豐欣樂太平也大小悅服大小尊與幼也悅服慶悅來朝也皇天感善而輔之上方助也神明應德而祐之天地喜也故得龍顔百福故得即得也龍顔君主之貌百者數之緫名福者壽富安和人服神佑貴而終天筭也聖壽萬春聖壽者遐年運也萬春者數之極也逮乎嗣王南面貴之垂衣而弗能遏也逮及也乎文辭也嗣王君之子也南面貴之貴之至也垂衣無爲治化也弗者不之重稱也言人君能用此之至化體無爲之變通依天地之大理即得遐方幾所欣樂來朝大臣小民慶悅而服又感上方輔助神聖禧扶百福和於天顔壽禄臻於帝座及乎太子終運繼承垂衣南面無爲獨尊他莫能奪奚弗爲良者哉洞曰人之元神能用元道之道元道之德觀天地之機依天地之理法道同行即得遠近欣樂遠者天庭首也近者湧泉足也萬神來朝玉京之神故云欣樂大小悅服五藏之神六府之精皆生慶悅而咸化服也皇天感善而輔之皇天元炁也言人能若是故天炁自歸於身也神明應德而歸之神明者道炁之神也言道炁之神自來扶與於身也即得龍顔百福萬神之鄉而曰龍顔之首也神之至和而生於百福也聖壽萬春者混合道體無有終年歸根復命長生久視之道也逮乎嗣王者嬰兒之炁而曰嗣王也南面貴之者抱陽獨尊而登道域也垂衣而弗能遏也者我無爲而民自化也頌曰仍能法道地天機即得長生翠羽枝神秀一時通紫户慶雲自是捧子歸臣忠章第二處下曰臣進節曰忠政典曰章次序曰第隂陽曰二言臣節可以進忠於君矣洞曰精血氣肉筋骨皮毛而爲身中之臣也獨心中之神而處絳宫面爲君之同像也常使内則無毁而外無傷内則益沖和浩然之氣外則保肌膚潤澤之光然如是者方爲臣奉君之道矣頌曰諸藏爲臣心是君絳宫獨坐抱陽品他邦貢我丹天璧自得無爲道轉新爲臣之道也忠良以事于元首死節奉上曰忠仁愛下民曰良于於也元首君也善政以治于下民調和四序遜令遜者順也春生夏長秋收冬藏乃爲四時順天令也上下和平庶人厥生而安之天下曰庻百姓曰人厥者其也生者業也君主厥邦而固之其國堅固所以由是方能處于天爵世世而何能殆也由用也是此也居位曰處于於也天爵者君之富貴世世者不絶之稱殆危也言爲臣之道者忠節奉於君上良心治於下民善政臨斷公義付曹司於四時而順其序若能如是上下自然和平也庶人自然安生也君主自然固國也天爵自然久示也用之如是奚有危亡之兆也洞曰人之心意爲天谷泥丸之臣也故在丹忠進道洞達杳㝠修正却邪時刻在德以奉君主天谷之神復以善政慈愛以御下民諸藏之氣也四時者木之氣爲人之魂曰春火之氣爲人之神曰夏金之氣爲人之魄曰秋水之氣爲人之志曰冬土之氣爲人之意曰四季若能制此得和順乎其令自然上下沖虚一身安泰元神宴熙固而長守也所以由此方同受天禄長生無終奚有危亡之兆也頌曰明淵正性覺事上智慧神通戮邪障壺中調制地天春方證圓明大乘藏父義章第三陽尊曰父中宜曰義父之所以尚者其子之幼也抑保而愛之尚猶貴也子幼子年小也抑蓋也保而愛之者仁心厚愛育之及子之長也歸師而教之子長立人身也歸師而教之使習先王之典教也導之以禮遜導引也謙恭敬順曰禮文樂柔和曰遜習之以聖書習學也聖書聖人遺文也其立于身也使之以進業立于身者成名君子也先王道德謂之大業豫之以誡訓先曰豫見子有過先以言誡教之使時刻而行仁道先王之法謂之仁道動止而順忠信動止行住也誠志曰忠誠言曰信若乎匪從然後責之匪不也先之以誡訓不從然後責之也責之弗從即可罰之法理曰罰屈强拉剛而令遜乎道德者孰弗云斯爲義父焉屈强者曲强硬之心屈曲也拉剛者折剛暴之意拉折也遜順也曲强折剛令順先王之道德也孰誰也弗不也云曰也斯此也言父之貴者若子居幼也蓋務保而愛之仁厚育之及子成人也令歸仁之師也引之以禮樂學之以聖言習黄老之教周孔之爲而成君子進于大業若有過也豫誡教之時刻動止常由仁道每用忠信若不順也以言責之其不從也以法理之曲强折剛令順道德矣若能如此誰不言之此爲義父之道也洞曰夫水者乃木之父也木者火之父也火者土之父也土者金之父也金者水之父也人身之間所爲金魄爲虎火神爲朱雀水精爲玄武土衛爲黄戊金翁者皆爲元炁之父也此名五老上人故五老上人可保元炁之子而養之於幼也及元炁之長生也當歸其師師爲君主之官神明是也引之以禮樂者火性主禮樂生於心歸應離也學之以聖書者水性主志文生於腎歸應坎也離火主禮樂坎水主文昌故火中生水水内生火動機運轉水火昇降方成嬰兒之身故得上下沖和水裏虎行火中龍步雲在陽天風生陸地昔者真仙有言曰五行顛倒術龍從火裏出五行不順行虎向水中生是也是以時刻而行泰之像動止而順道之德若其不順之炁即調而順之若其已順之炁即和而平之故不順者罰已順者賞曲强折剛而令順遂道成遷而就德若能如是即得長生久視遊宴遐年誰不稱之爲義父也頌曰父育子時觀道理依天執制妙非止機中把握地天晶明月清風料無比母慈章第四生我曰母俌我曰慈母之所以畜乎嗣也抱胎而教之以禮畜養也男女曰嗣懷孕曰抱教之以禮者言聽動觀行止坐卧皆由聖人道德先王禮樂胎教如是生子多聦慧賢俊明文也及其誕也漿飼而愛之以衣誕生也漿飲也飼付於食也愛之以衣者以衣被之也罔隳厥形罔無也隳殘也厥其也身體曰形罔殘厥氣罔殘者無傷殘也厥氣者其内榮衛也逮乎嗣之已成也歸之厥仁而致正以教之逮及也嗣之已成者已成人也歸之厥仁者歸於仁者之師也致正以教之者祈師訓先王之法也匪失師範孰弗偁之可謂慈親之道矣匪不也失棄也斯範此法也孰誰也弗不也偁稱也言母之養乎嗣者當抱胎訓之以禮也若生嗣也賢秀昭文其成形也飼漿舉衣無傷其身無殘其氣及成人躬當歸師也教之以道德無失斯禮誰不稱之爲仁母矣洞曰元精之晶而爲真血之母真血之魂而爲神明之母神明之神而爲肌肉之母黄戊之英而爲魄氣之母此之五母而爲精血神肌氣也此者爲神故曰母胎仙爲氣故曰子胎仙者元炁之子也常使母抱其子而用禮也夫禮者勿令神非禮言聽動觀也故令神以禮者乃不失其元炁也及胎仙之長也可水溉而以衣衣爲震魂曰木木中生火水爲坎志曰精精内生水水火相滋於坎男離女之間乃秀丹華赤龍之形人身若能造化如是即得不損其形不傷其氣及其如此嗣之已成内化之丹自然昇於元神天谷之間元神天谷宫爲仁師所聚之鄉真中之神謂之師也而降正真之炁下俌於群嗣也萬神曰群嗣若能不失此法即得長生之基神仙之妙上下沖和三宫混合飛龍在天風虎居地水出火宫火生水府會四象於黄庭合五行於紫户此之際也誰不稱之可謂仁慈母之妙道者哉頌曰五母相資五子芳到頭終不離隂陽機中把住天元理便是違來不夜鄉昆友章第五昆兄也友悌也夫爲人之昆也宜乎以悌讓夫起文之辭爲作也人者隂陽秀結而爲人也昆兄也宜當也悌義也讓謙也由乎以仁思由用也仁愛之厚曰仁義讓之厚曰思以悌讓而感之用義讓謙和而感於弟也以仁思而昭之用仁愛之思而明於弟矣昭者明也其于弟也自作懽心于於也長曰兄次曰弟作起也懽喜也神居之鄉謂之曰心同興厥志在心曰志以事父母修斯匪棄是謂良昆之道也行此不棄此曰良兄凡爲人之兄者當用義讓謙和之心仁愛悌順之德以感明於厥弟其弟也自起懽悅之心同事親焉若能修此而無擲之可曰兄之善道也已洞曰小腸膀胱命門者腎之兄也膽者肝之兄也大腸小腸與胃者脾之兄也神明天谷元晶者心之兄也沖和榮衛之氣者肺之兄也凡兄者爲陽府之神且弟者爲隂藏之氣也仍能依觀天道地理隂陽大小定法遠近執神會合二象異骨成親將爲日用持而行之即得上下沖和而成順之道也故曰國安民豐欣樂太平矣夫悌讓者氣之順也仁思者氣之理也以氣順而感降真鉛以氣理而明伏真宰順者則點制靈胎明者則抽添水火順而契之則生逆而流之則死以死返生以生奪死法乎動靜制而擒之長生之基近之者哉若能如是其於藏之弟也自起沖和之炁歡心者沖和之謂也同興厥志志者腎宫元炁也以事父母父者精之元基母者血之祖産陽府順而隂藏理昆弟和而父母安修此行之而無少棄者是謂昆弟之機修生之道者哉頌曰欲理弟兄家壼天月在霞隂陽交泰處精血化爲砂耿耿千秋主澄澄七世華配合歸一炁白髮自然鵶弟恭章第六次曰弟敬曰恭夫爲人之弟也宜由厥恭宜合也由用也遜事厥兄同叶厥力孝養父母叶助也同事於親父母若終悌讓勿窮終逝世悌義也讓順也勿無也窮盡也以斯弗怠可謂孝悌矣以用也爲人之弟者合用以敬順而事於兄長同助其力以事於親親之若逝同處其居義讓無終而非少怠若能如是爲孝悌也洞曰絳宫赤龍者青童之弟也而爲神與血也東方青龍者玄武之弟也而爲血與魂也元宫玄武者白虎之弟也而爲精與志也金庭白虎者黄戊之弟也而爲氣與魄也中央黄戊者丹天之弟也而爲榮與衛也夫青龍白虎丹童玄武黄央者乃爲木金水火土也而爲隂陽陽隂之祖炁矣祖炁者乃爲道之一也人能抱陽守一而得長生之基而爲天下之式也故隂陽混合男女同室無漏無爲者人之大倫也夫隂中有陽其陽善助震陽也陽中有隂其隂善利兊隂也是以隂陽迭和人身太寧隂陽互逆人身太塞聖師云清者濁之源動者靜之基人能常清靜天地悉皆歸清者陽神也濁者隂氣也人能清濁得機隂陽得化者其天地至真之炁悉來自歸於身也是以百骸理者在乎食其時萬化安者在乎動其機夫動者氣血也動之則生靜之則死夫靜者元神也動之則死靜之則生故性有巧拙至可以動靜者此之謂也此爲先王之祕㫖誠爲之要也爲人之弟者當義而順其兄助元而和其氣孝奉天谷泥丸之神神者親也陽天谷而曰父隂元宫而曰母隂陽沖融之氣混而凝素乃結其神父母是也斯爲五行之宗矣五行順則天谷安昆弟逆而父母病夫病者當以隂煉陽返陽助隂隂陽之間天地之理互相滋利其能長存故易有言一隂一陽之謂道也父母若終者混成終身之固天谷之實也悌讓勿窮者炁順而無窮也若能猶是而非少怠可名孝悌行莫加焉夫君子之保身猶侯王之保邦身在則道在邦固則民安將不由是者奚弗爲愚矣頌曰昆弟諧和上下沖元神得一秀芳中簾幃貫得靈胎後占却離陽第一峯子孝章第七孝親曰子報親曰孝紀綱之首者始爲事親之道矣紀綱道德也首始也始初也事親之道者奉父母爲道之本也親之生也𢜬兮時而衣之𢜬量也時候也獻衣曰衣俟兮候而養之俟待也候時也養敬獻食也豐之於家靡使憂畏之心而作之豐盈也豐之於家者室富也靡無也使令也憂悲也畏懼也和之於里匪使寒暑之勞而處之和之於里和鄉黨也匪無也匪使寒暑之勞而處之令親冬温夏清而閑居也若乎親之有失也可幾諫而諷之親之有失者親或有失之也可當也幾微也諫勸也諷諷諫也其不從也可諍諫而忠之不從者親或不從也可諍諫而忠之者當諍諫而用忠心勸之者也却失遂德而反遜乎道矣却與却同失過也遂德者成其善正也反復也遜順也道者仁人之道也若親之有疾也可兢兢而綏之愼而安之綏者安也其親之年痗也可惶惶而備之親之年老一喜一懼備終孝之禮者也及其親之喪也當竭孝而葬之親之亡也忠心葬之抑其歲之時也可追思而祀之春秋祭祀以時思之能事斯範可歸道矣能善也事奉也斯範此法也爲人子者養親以衣飲而敬順之豐榮於家無令以悲憂而念懼之和同鄰里無令親處寒暑而勞之親之有失當諫親無不義而陷之親之疾也及老年也愼而安之敬而備之其終年也誠而葬之其惟時也祀而享之能猶是者則歸長生之道禪定之宗方能善矣洞曰隂陽者道之子也天地者隂陽之子也人者天地隂陽之子也萬物者人之子也人能畜播萬物故爲萬物之父也凡爲子者常以孝事其父方入道德者哉理法前章推窮真探以外觀内以像觀真以有爲有形體無爲無形以空色可名體真空常道悟達元基淵明真主者其惟道人矣頌曰以像觀真體任真真全方可祕黄庭九泉應我無名姓金闕須當立證明杳杳㝠㝠熟解悟昏昏默默契玄靈動機斬却靜中鬼何慮飛雲不上昇又曰文煩道出口道味弗文煩况味中間體心開意自還又曰得悟一言廣非明萬卷微都來斯一字剛甚苦東西又曰道者非爲道言時已在空行到不言處方當是本宗女貞章第八隂中之陽曰女樂而不婬曰貞良臣弗事二主良臣忠相也弗不也弗事二主者守志於仁君也烈女匪娉再夫烈女貞婦也匪娉不事也匪娉再夫者守其貞也女之尚者貞烈而已貴其烈也女之道者潔操而已清潔節操女之正道女之事其父母及其舅姑也可進其孝女之事其父母者在家事其長上也夫之父母曰舅姑可進其孝者以孝事親也事其已夫及其長幼也可進其良善御上下也遠嫉妬之心戒非是之口却佞心忘僞說守其紀綱及其自躬也可藎其貞守其紀綱及其自躬者心存道德身守貞烈也藎者進也貞者動止善正也貞孝弗違善正不背也醜善弗怠醜衆也醜善弗怠者愈美行也若能猶是可謂節婦矣良臣不事於二君以全其忠也貞婦不婚於再夫以守其節也女道之貴者惟貞烈清潔持節守操宜行諸心也事其長上以孝敬御夫守己以善和其於一切大小親疏惟克恭克禮勿越謙讓却佞妬心忘僞談語守斯衆善而弗違之者誠云良婦矣洞曰丁火者甲木之女也而曰天庭至寳己土者丙火之女也而曰圭丹靈藥辛金者戊上土女也而曰白虎真晶癸水者庚金之女也而曰水鄉紅鉛乙木者壬水之女也而曰龜精鳳髓此之五者皆不離精血神氣男女隂陽若能混合歸元聚於黄庭上則沖於天谷泥丸下則通於絳宫元府育養三元調和五藏明浩然靈光之性達昏㝠恍惚之機百骸自理萬化咸寧神明氣榮精洪血盛成嬰童之體理元道之神即得水中火出火内水生龍飛雲而雨降長空虎嘯風而陽昇陸地其神得秀聖胎得圓至乎無間出乎有爲寔曰其神之神所以神其真之真所以真妙覺鑒清秋而印明月真靈照素華而現江水仍能志法是章歸宗内照以假像而求真像以外神而行内神者真道人之謂也若聞義不能徙覺道弗能悟惟守一方非知他所者何異木中析玉石内鑽冰以真任真者異人以真任僞者愚物道本忘言忘言難化於群生德本非造非造何述於法則淵哉在人靈而明悟通達體自然也一分慧者即道輔之一二分明者即道輔之二乃至百千萬億無盡無窮而明慧者亦道輔之百千萬億無盡無窮之妙矣道本無窮盡學人量器承若止仍憑說徒勞謾苦辛頌曰隂裏純陽輔我嘉簾幃光射太空霞斗牛宫裏無塵界步步金蓮陸地花又曰春色媚如鴉桃容映杏花滿川風月景不限帝王家竹塢金鞍客芽齋草帶沙志人提挈住都去卧煙霞上方靈寳无極至道開化真經卷上
