front:
  text: 上方靈寳无極至道開化真經卷下伯三
  hash: sha256:c55fcf2a08e0547757db38c47018d49263f1c6f5ca9521d337ec8d5cd4f2661a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0035_HFL_003-001a, image: hfl/0766/0766-084.png}
body:
  text: 人倫章第十七天地之秀而成人也道德已成謂之倫也主用賔曰明主人使賔客順道而爲明夫明者素之道夫素者乃爲見素抱朴無私無欲無勞其形無摇其精虚心而體天之道實腹而法地之德能猶是者可謂明矣真常耿耿妙無涯人靜江天草帶葭孤館竹籬茅舍地清風和月照梨花賔動主曰昏賔客動主人逆道而爲昏混像固曰真混合有像物堅固而爲真同器殘曰刑同器傷殘内外謂之賊殺嚴刑出入全曰神出入不失其道而全神内之神動靜中曰清動靜中道而立謂之清靜之根大像凉曰寧大像實而火盛以凉減而方寧太虚炎曰盈太虚有像已失炎火益而可盈居和沖曰平已居神氣之内用沖和而平之神居有間之根用昭清而悟之順時嗇曰澄嗇者養也順四時之候而飼有益之物常飡有氣之食陽漿助殻隂水却之以濁復濁以穢補穢養成其神就以離火真陽之精接而鍊之法時于丑寅之間法日於一候之内二卦爲年兩弦爲月上閉七竅偃脊縮臍鼻收清氣入元宫候氣已定方出濁氣依此行之漸成真道故曰食其時百骸理動其機萬化安也頌曰欲理洞天芳同根養蒂昌初月宜脩竹梅花禦雪香濁體清還秀流源靜自彰渺渺離陽格能交坎炁罡食時温匪棄運候火無傷養就沖霄體澄澄大道郷又曰玉溪仙洞野人家曉色晴嵐遠帶沙隱約水邊流入户元來都是片桃花又曰安神保命在無勞寡欲亡私體自膏每用食時温養外洞天離火鍊成善變化曰靈居有爲而無爲善變化而靈明法天道曰成執觀天道而行内外之機即遂生成目下長春不夜故經云天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之人之道則不然損不足以奉有餘孰能損有餘而奉不足於天下者惟真道人乎人能法此天之道而成神仙之躬也仍猶是者曰人倫仍能也猶如也成于妙道也罔猶是者胡弗沉罔無也由用也罔由是者無用此也胡何也沉溺也吁欣兮隳在遊爾乎所聞吁苦趣也欣仙道也兮文辭也隳死基也在生首也遊爾乎者苦樂死生遊爾乎此所聞者耳之所聞章中之義洞曰神爲主也人心正覺之性也氣爲賔也人腎沖和之炁也心曰主公意爲賔客常令神使其氣心使其意即得順而泰矣胡不然者則將反是矣故曰心使氣曰强主用賔曰明也能如是哉則合有像而得其固同有爲而却其刑自得出入全其神動靜中其清若陽太炎也以水而凉之若其太虚也以火而温之若居沖和也以真而平之若處四時也以保而育之能猶是之也變通而善化法天之道也妙道而已成也慧性一開廓達清虚之境元明昭現寥通天地之根識破有爲同有像而如夢電覺知無色混無像而若真空是故變通不測其神否泰不量其器出死生之岸離苦樂之鄉遊浩劫以長存步黄華之妙境者也頌曰出世須憑向上文人倫章内顯其真還能達此行諸足便是玄元无上人響應章第十八響應者因果也響應之道者自乎天人矣人作而天應之故得天人相通也人之所發者聲之所應矣其猶谷之作音也空谷之言響聲應之人之善惡禍福隨之人之所造者感之所報矣其猶影之逐體也形物曲直其影隨之善惡昭報因果定矣夫天道者與善而輔德矣天之羅者恢治而罔極矣天道無私惟在親善助德扶忠佑良滋孝益仁而已矣鑒兮自然照於天下其如秋月印於江水也司兮善惡主於天下其如寳鑑對於形物也皇皇者矣昭昭者哉皇大也昭明也高而無位大而無窮明浩茫茫故再稱也順之者降乎百福作善者皇天降福作不善者厚土臨殃逆之者降乎百殃罔上虚民皇天弗保殘賊仁義天錫爾殃示乎感應昊然巨彰示明也示乎感應者昭報因果也昊天也巨大也昊然巨彰者天然大明注於今古也抑哉人也宜乎愼詳蓋爾之民思而畏之洞曰畏天命者君子之芳言觀天道者神仙之法則順而行之則昌逆而用之則死是以聖人積德合天將神契道以至長生久視之道不由是者寔愚之甚也頌曰報應其如秋漢月光暉水鑒清江色無私無曲地天明人世人思大神哲進退章第十九行藏合正動止觀天道德善正者可明而進之非道德善正者可斷而退之天道之行者可以行非天道之行者可以止能明而進者乃曰真人矣真人之用者所謂知足樂天儉止寬慈之謂也知足則富貴莫能及樂天則愛累弗能逮儉止則不足匪能邇寬慈則灾害罔能近此之四端猶身之四肢也全之者爲真人之躬故真人之用矣能斷而退者亦曰真人矣真人之常者所以遜時順大平善昭神之謂也遜時則遠其害順天則近其福平善則入其道昭神則出其世此之所謂全之爲真人罔之爲小人矣若能明斷進退遐邇由斯方可達真幾於聖也人能進退明斷遠近用此方可入真近聖人之郷入聖人之室也洞曰全身者曲而不直成譽者直而不曲脩身者名貨有費名貨者脩身有違彼者弗能此此者弗能彼若能彼之爲此此之爲彼者惟真人之謂也故聖人云良賈深藏若虚盛德容貌若愚直而不肆光而不耀者玄之又玄先師之妙訓矣頌曰道德先王禮樂昭用時即得地天寥非斯難脫浮生夢柳岸空教月氣瀟宗元章第二十祖三教聖人宗元流無異人之學而達貴者吾知習聖人之要矣夫聖人之要者凡有其三焉要分其三歸之則一一者在乎儒其要則爲忠孝仁義禮智信文德正明典兹爲要矣上中二卷皆言此矣兹此也二者在乎道其要則爲希夷純朴清靜無爲昭神制氣慈足柔和普惠無窮混一同塵復命歸元兹爲要矣希夷純朴者元本希夷體無形神是神行藏周遍處無處不光明純兮素朴三世明覺體道如如妙中真握清靜無爲昭神制氣者應物以情求有像像中得意返忘情昭哉神顯江天月氣若洪時人自靈氣制神自招無爲清靜調身得純陽舍何愁丹地苗真廣氣洪抱素三宫自得堅固元神此日優游明月清風爲侣精血養靈苗居濁神氣調主公燕靜處笄女自妖嬈出殿乘宫馬金鞍玉珮摇瀟湘明月下鞭指白雲橋慈足柔和普惠無窮者内外慈柔和寬中用道麽無窮皆得潤明月照清波慈愛生靈皆足柔和臨處滋畜無窮普惠齊恩柳岸江頭風速錢塘月照東郊蘆花深處郁郁天河數點寒星燭破幽關東北混一同塵復命歸元者混一握三十百二同塵妙理最非治歸元父母復其命方到真光無昩地硌硌浮生夢塵沙悉是空悟得本來面方爲第一功名貨塵情浮幻多還如晨露比江河爭如猛省逝乎大妙意行時人自和像内求真心使氣氣興心朗道無滯壼中把握地天春柳岸清風妙無際一陽纔發寒蟾抱朴緑水潺潺清風颯颯古岸瀟湘横舟鼓角公子亭亭妙中音樂三者在乎釋其要則爲慈悲忍辱究竟平等彼此因果普利衆生入無相法演大覺經淵明真宰兹爲要矣慈悲者慈救衆生出愛河皆令得度浪濤波齊心逮此幽關鬼寃債親疏悉解麽解脫苦趣而樂靜郷忍辱者萬苦臨時我自如真如不動任君誣忘情已到絶斯四人我衆生壽者歟究竟者識破浮生一切法皆爲虚幻夢中朴法猶尚假況斯像一切有爲皆喪覺窮究有爲一切像像中悟得幻泡障既知緫是夢中虚即便回頭入无上照破浮生夢元神自得明無心方此定風月始爲鄰嘯朗青山足瀟湘緑水澄江頭無限景都在帝王城平等者生死親踈寃故債一心如意悉令解周生濟死妙當時若不違時道應在彼此者悟道超昇彼岸清迷情染像我應沉飄摇三界綿綿此可惜青春無限人因果者種此善因獲善果若施惡種惡還增大哉因果鑒如影步步相隨報應明普利衆生入無相法演大覺經者諸相皆爲夢無身却是身明中元一炁相輔得長春淵明真宰者正覺昭然體是真真中動止勿教沉非斯難翫江頭月緑水青山勿悮君是故三大聖人之要者同源而異舉之相一而分别之化無極之身演無極之教普利平等仁愛一切應化無邊盡塵沙不可量皆談真正教利死與超生凡能肇竟禋要而悟行諸弗怠方得貴矣肇始也竟終也禋敬也諸之也三大聖人演萬法於人天其造無殊本同歸而一矣洞曰道生一一生二二生三三生萬物夫物芸芸各歸其根者惟一分衆衆歸一也惟有一乘法無二亦無三者還同之謂也乃至聖人一以貫之皆大道有統殊途而同歸矣是故君子不器而爲一隅矣我先師云三大聖人者皆分身應化逐器隨機方圓慈造而爲度物奈何後世愚輩執性多弊强另分别恃我之心非於彼者即得遞相嫉妬互起愛僧此之所爲俱陷地獄後世英才宜當慮之故聖人云執者失之也老氏曰善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣人能窮斯至理晝夜無忌行而用之善非逮也頌曰歸依道釋與宣尼晝則無忌夜亦隨用我聖人三教理何愁不到鳳凰池脩真章第二十一履道之鄉謂之脩真頌曰混跡同塵足則休壺中把住帝王州清江水照寥天月緑草猗猗古岸頭脩真之道者聖人之貴矣夫貴者元炁也夫元者爲晶神物之宗也夫炁者爲隂陽像之祖也聖人之道所以尚者元炁也元炁之基所以貴者精血也夫元炁備者法配水火制定鉛汞合彼震魂長生者矣元炁備者男精女血元而堅固也法配水火者道合離坎也制定鉛汞者點化乾之鉛制鍊坤之汞也合彼震魂者混合震宫之魂以青龍真精契之也長生者不夜之鄉也夫元炁損者法配清陽補益水火提挈兊魄復命者矣法配清陽者道符震兊也補益水火者宜添離之髓當抽坎之氣也提挈兊魄者提挈兊宫之魄把握震宫之魂此惟言乾坤離坎震兊之像而不言艮巽者何也是故聖人云舉一隅不以三隅反矣其内二像亦隨彼而益矣故未及言之且多言不若守中也復命者陽得隂而謂之歸根隂得陽而謂之復命也所謂定其所備和其所損足者點成砂裏汞虧時補益汞中砂以炁益炁以神滋神隂之氣血善能益於陽之精神也陽之精神善能滋於隂之氣血矣逐其患濕人身之中而有者三宫也其上中者而名泥丸絳宫也其下者而曰元宫矣此之三所乃神氣精血所居之鄉非患濕隂邪所在之處故其患濕也宜爲却之矣成乎妙軀若能如是即成道身脩身之要貴乎是樞脩行之首斯爲要矣人能奉之神仙者歟人能行之而登陽天岀入金門身得神仙矣洞曰動其氣而靜其神益其血而點其精者則得漸成實其腹而强其骨堅其腦而住世雖非白日昇天猶能長生不老者矣頌曰男是真陽更覓陽陽中點制得其昌人能遞互復其命便是神仙不夜鄉鍊性章第二十二董成真覺種方號道人身鍊性之大者治賊而可矣夫賊者凡有其五焉五行之像謂之五賊一曰志也其性爲恐謂之寒賊若能治之名無漏性志者水之晶而爲人之腎氣之主而爲志也其性爲恐謂之寒賊者腎氣之志主恐懼驚怖之像此像生也大損元覺之神矣若能治之名無漏性者慧光照鑒此之恐志内明真宰故得不怖成乎無漏廓然清素月白風清古岸汀洲之境也離斯無色界沙塵緫是空妥妥如如體清風明月中二曰魂也其性爲怒謂之嗔賊若能治之名清凉性魂者木之秀而爲人之肝血肝膽之主而爲魂也其性爲怒謂之嗔賊者肝膽之魂主嗔怒忿爭之像此像生也大損元覺之神矣若能治之名清凉性者慧光照鑒此之嗔魂覺悟真空其如夢電即得返照回光元明洞鑒朗月秋天清風古岸遂清凉之果成靜土之郷也三曰神也其性爲喜謂之樂賊若能治之名希夷性神者火之真而爲人之心神心神之主而曰神明也其性爲喜謂之樂賊者心神之神主喜樂遊逸之像此像生也大損元覺之神矣若能治之名希夷性者常有欲也以觀其終常賊興也以察其幻即得悟機達本反視回光成希夷之性視不足見聽不足聞此之際也即得悟生無介目之累保神有清靜之方江頭緑草嫩猗猗而葦施蘆花古岸横舟月瀟瀟而清風滿袖元明此日方當現清靜門中我正閑塵世拂開真宰現元神跳出死生關四曰意也其性爲思謂之貪賊若能治之名無爲性意者土之肌而爲人之脾胃脾胃之主而爲意也其性爲思謂之貪賊者脾胃之意主想望思念之像此像生也大損元覺之神矣若能治之名無爲性者人能治之乃曰無爲千秋萬古之真皓月清風爲侣也五曰魄也其性爲憂謂之癡賊若能治之名大明性魄者金之氣而爲人之肺氣肺氣之生而爲魄也其性爲憂謂之癡賊者肺氣之魄主憂愁煩惱之像此像生也大損元覺之神矣若能治之名大明性者人能絶此即得緑水青山之境長春不夜之鄉大明無翳而已矣此之五賊咸在乎心此之五賊而爲五行之像也萬化之宗矣萬化所主者藉君於心也是故聖人言五賊咸在乎心也人若順之則轉輪三界人順其賊也而行恐怒喜思憂之性也即沉淪没轉遊三界矣夫三界者欲界色界無色界也三界之内而有者四境也夫四境者財爲欲境色爲愛境酒爲迷境氣爲嗔境此之三界而同四境者惟天人之愛河乃群生之苦海五賊而喜者其惟境界也是故聖人云人若順之則轉輪三界矣咄哉五賊沉人無覓三界綿綿四境默默愛河蕩蕩舟楫難釋無色陽天空留清碧人若治之則神蹈仙京蹈履也人治其賊也而亡恐怒喜思憂之性也即履長春神仙之鄉矣遠離三界不居四境出此愛河身昇玉京朝禮上帝稽首天尊歡喜踴躍皇道開明是故言聽動觀一切時中皆當明照制鍊脩行如是弗怠即得福生無際遊宴長春也洞曰人能動止心興意舉體措身爲一切時中常觀妙化淵明真宰識破浮生悟落花之境省如夢之期制脩斯道擒欲亡賊者即得翱翔紫闕遊宴長春也頌曰迷者沉淪悟者仙何須苦苦殢經篇到頭只是昭清覺打破塵籠自有天明素章第二十三廓然洞徹謂之明混混沌沌謂之素人皆行此空色不能悟彼明素人皆行此空色者人處三時夢時時緫是空三時者過去時現在時未來時也不能悟彼明素者貪戀空中有孰知步步空自從無始劫至此尚盲聾吾能破此空色亦能行彼明素吾者假中之真有内之无无内之有恍惚之間長生之者是爲吾也吾猶我也能破者五鬼亡時見我身我身無處不光明何須直待能乎破不待能時賊自沉亦能行彼明素者善離諸像而入無爲也夫空色者所謂恐怒喜思憂之屬也五行所主而性自然夫明素者所謂昭清覺靜慧之屬也明達無爲謂之昭靈光無染謂之清居像不昩謂之覺斷絶邪障謂之靜出入同道謂之慧此名五印土也如人能破此之空色慧靈悟解洞徹光明離有爲法入無相身一切有像終歸真空故要離之無形之神洞而不滅要當入也同道無終獨斯者哉洞曰薰成之性同道身而不滅者其惟斯身也斯身之名聖人呼之非爲一號道君稱爲不神之神釋迦稱爲如來之相聖人言爲君主之官宣父論爲仁人君子至於主公真我佛祖金剛者皆同歸而異途矣大抵只爲人之元來之性心神是也然此心神要當亡其五賊除其五性賊性者乃爲恐怒喜思憂也即得生其五體昇其五印體印者乃是昭清覺靜慧也能猶是者乃曰道身非猶是者止爲衆生矣夫道身而全斯治者乃曰鬼中神仙也夫道身而全斯治及乎結汞凝鉛混同道體建德合天積功累行者乃曰天中神仙也道身未全能點精易氣積德利人者乃曰陸地神仙也夫道身未全精神未備惟忠孝仁義正德柔和者乃曰水府神仙也夫道身未備善德未脩惟保精益氣鍊血愛神者乃曰人間神仙也夫道身之稱者乃人心之謂也人心所亡恐怒喜思憂之性而成昭清覺靜慧之神者惟道身之謂也恐人悮解故再注之夫五仙之位而列五品天仙者居其一也地仙者居其二也水仙者居其三也人仙者居其四也鬼仙者居其五也五仙之位互有高卑人心之造其惟異也還不然者而爲五苦五苦之由則將反是矣頌曰靈性無形道陽光像内真二端相合處萬古不能沉常道章第二十四妙覺靈光微寒潭照秋月天漢大哉炁相符洞無滅陽精隂髓呼吸而已德配三才自然之理青松影下緑禬隂中風月瀟湘真如妙用三三六六坎離洞谷妙應隂陽通光無欲頌曰帝王官闕瑞煙嘉處處江山罩綵霞紫鳳飛鸞成羽蓋黄金白玉秀珍花翩翩臺畔龍樓室瀝瀝筠中翫女家尚矣君哉攸德處無爲爲裏就丹砂又曰真人居處是仙鄉步步還同妙境方塵意拂時山水秀道心開處竹松良清風友者應明月靜谷鄰兮豈世倀惟有白雲千萬頃朝夕與我著翱翔又曰仙公得道始名真不在濁兮不在清亦匪太過還不逮又非中道立乎身的端妙處云何說今日言中子細論其道無可無不可死生榮辱在活心常道之道非化非造常道之道者綿綿晝夜時刻相借非此絶生得者無榭非化非造者動靜滋物空同恍惚合理自然神昭素燭常真之真非名非形常真之真者日用清真秀出天庭沖和在手妙力滋新非名非形者可名與形勢終已傾非此體號却入真靈其乎動也應物以善德元真洞照湛湛清妙來者應之其如鑒耀其乎靜也寂湛以淵清真如靈處三千界契理合天妙非怠壼中皓月與清風滿目瀟湘遍舟載竹逕瀟湘風蔌蔌南山一帶籠煙谷停驂一顧墜金鞍滿目睛嵐似珠玉此之際也弗脩弗證善惡俱亡因果消豈分彼此與昏朝清輝面目昭千古雪裏梅花竹在梢適乎不器入乎妙靈誠不神之神乃道沖之道一任縱横天地間何須獨步此江山周遊大道應無色妙理還時不復還清覺一聲笛滿袖幽琅三弄瑟應寒元真洞徹先天外點破塵沙欲界關同萬物竟而不滅隂陽生而不窮洞然無間玄玄者也上方靈寳无極至道開化真經卷下
